name: Validate

on:
  workflow_call:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Ensure image rendering dependencies
        run: |
          if command -v fc-match >/dev/null 2>&1; then
            exit 0
          fi

          if [ "$(id -u)" -eq 0 ]; then
            apt-get update
            apt-get install -y fontconfig fonts-dejavu-core
          elif command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y fontconfig fonts-dejavu-core
          else
            echo "fontconfig is required for sharp SVG text rendering."
            echo "Install fontconfig and fonts-dejavu-core on the self-hosted runner."
            exit 1
          fi

      - run: npm ci

      - run: npm run lint
        working-directory: frontend

      - name: Run test suite
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build docs
        run: |
          npm ci
          npm run build
        working-directory: docs

      - name: Start app
        run: |
          touch backend/.env
          npm start > /tmp/aurral.log 2>&1 &
          echo $! > /tmp/aurral.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/api/health > /tmp/aurral-health.json; then
              cat /tmp/aurral-health.json
              exit 0
            fi
            sleep 2
          done
          if [ -f /tmp/aurral.log ]; then
            cat /tmp/aurral.log
          else
            echo "App log not found at /tmp/aurral.log"
          fi
          exit 1

      - name: Print app log on failure
        if: failure()
        run: |
          if [ -f /tmp/aurral.log ]; then
            cat /tmp/aurral.log
          else
            echo "App log not found at /tmp/aurral.log"
          fi

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/aurral.pid ]; then
            kill "$(cat /tmp/aurral.pid)" || true
          fi
