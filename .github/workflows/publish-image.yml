name: Publish Image

on:
  release:
    types: [published, released, prereleased]

concurrency:
  group: publish-image-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  publish-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate release
        id: validate
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-test\.[0-9]+)?$ ]]; then
            echo "Invalid tag format: $TAG"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log into ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.validate.outputs.version }}
            type=raw,value=latest,enable=${{ steps.validate.outputs.is_prerelease == 'false' }}
            type=raw,value=test,enable=${{ steps.validate.outputs.is_prerelease == 'true' }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.validate.outputs.version }}
            GITHUB_REPO=${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
