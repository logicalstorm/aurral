name: Publish Image

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: ["main", "test"]

concurrency:
  group: publish-image-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  publish-image:
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'test')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
      - name: Resolve release tag
        id: release
        run: |
          git fetch --force --tags
          mapfile -t TAGS < <(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-test\.[0-9]+)?$' || true)
          if [ "${#TAGS[@]}" -eq 0 ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${#TAGS[@]}" -ne 1 ]; then
            echo "Expected exactly one release tag at HEAD, found ${#TAGS[@]}." >&2
            printf '%s\n' "${TAGS[@]}" >&2
            exit 1
          fi
          TAG="${TAGS[0]}"
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ] && [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a stable tag on main, got $TAG." >&2
            exit 1
          fi
          if [ "${{ github.event.workflow_run.head_branch }}" = "test" ] && [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-test\.[0-9]+$ ]]; then
            echo "Expected a test prerelease tag on test, got $TAG." >&2
            exit 1
          fi
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        if: steps.release.outputs.should_publish == 'true'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        if: steps.release.outputs.should_publish == 'true'
      - name: Log into ghcr.io
        uses: docker/login-action@v4
        if: steps.release.outputs.should_publish == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        if: steps.release.outputs.should_publish == 'true'
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'main' }}
            type=raw,value=test,enable=${{ github.event.workflow_run.head_branch == 'test' }}
      - name: Build and push
        uses: docker/build-push-action@v7
        if: steps.release.outputs.should_publish == 'true'
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.release.outputs.version }}
            GITHUB_REPO=${{ github.repository }}
            RELEASE_CHANNEL=${{ github.event.workflow_run.head_branch == 'test' && 'test' || 'stable' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
