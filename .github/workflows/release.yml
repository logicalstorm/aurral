name: Release

on:
  push:
    branches: ["main", "test", "dev"]
    paths-ignore:
      - "*.md"
      - ".github/*.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  guard-head:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      is_current_head: ${{ steps.guard.outputs.is_current_head }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify workflow commit is current branch head
        id: guard
        run: |
          git fetch origin "${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}" --depth=1
          REMOTE_SHA="$(git rev-parse "origin/${GITHUB_REF_NAME}")"
          if [ "$REMOTE_SHA" = "$GITHUB_SHA" ]; then
            echo "is_current_head=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Workflow run is stale for ${GITHUB_REF_NAME}: head=${REMOTE_SHA} run=${GITHUB_SHA}"
          echo "is_current_head=false" >> "$GITHUB_OUTPUT"

  compute-release:
    needs: guard-head
    if: needs.guard-head.outputs.is_current_head == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      channel: ${{ steps.release.outputs.channel }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      make_latest: ${{ steps.release.outputs.make_latest }}
      reused_existing_tag: ${{ steps.release.outputs.reused_existing_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Compute release version
        id: release
        run: |
          git fetch --force --tags
          TAGS="$(git tag --list | tr '\n' ',')"
          HEAD_TAGS="$(git tag --points-at HEAD | tr '\n' ',')"
          node scripts/resolve-next-release.js \
            --branch "${GITHUB_REF_NAME}" \
            --tags "${TAGS}" \
            --head-tags "${HEAD_TAGS}" \
            --github-output true

  publish-image:
    needs: compute-release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.compute-release.outputs.version }}
            type=raw,value=latest,enable=${{ needs.compute-release.outputs.channel == 'stable' }}
            type=raw,value=test,enable=${{ needs.compute-release.outputs.channel == 'test' }}
            type=raw,value=dev,enable=${{ needs.compute-release.outputs.channel == 'dev' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ needs.compute-release.outputs.version }}
            GITHUB_REPO=${{ github.repository }}
            RELEASE_CHANNEL=${{ needs.compute-release.outputs.channel }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-tag:
    needs: [compute-release, publish-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or confirm release tag
        env:
          RELEASE_TAG: ${{ needs.compute-release.outputs.tag }}
        run: |
          git fetch --force --tags
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists."
            exit 0
          fi
          git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

  publish-github-release:
    needs: [compute-release, create-tag]
    if: needs.compute-release.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.compute-release.outputs.tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
            exit 0
          fi
          gh release create "${RELEASE_TAG}" \
            --verify-tag \
            --generate-notes \
            --latest
