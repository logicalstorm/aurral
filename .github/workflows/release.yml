name: Release

on:
  push:
    branches: ["main", "test", "dev"]
    paths-ignore:
      - "*.md"
      - ".github/*.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  guard-head:
    needs: validate
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      is_current_head: ${{ steps.guard.outputs.is_current_head }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify workflow commit is current branch head
        id: guard
        run: |
          git fetch origin "${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}" --depth=1
          REMOTE_SHA="$(git rev-parse "origin/${GITHUB_REF_NAME}")"
          if [ "$REMOTE_SHA" = "$GITHUB_SHA" ]; then
            echo "is_current_head=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Workflow run is stale for ${GITHUB_REF_NAME}: head=${REMOTE_SHA} run=${GITHUB_SHA}"
          echo "is_current_head=false" >> "$GITHUB_OUTPUT"

  compute-release:
    needs: guard-head
    if: needs.guard-head.outputs.is_current_head == 'true'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      channel: ${{ steps.release.outputs.channel }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      make_latest: ${{ steps.release.outputs.make_latest }}
      reused_existing_tag: ${{ steps.release.outputs.reused_existing_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Compute release version
        id: release
        run: |
          git fetch --force --tags
          TAGS="$(git tag --list | tr '\n' ',')"
          HEAD_TAGS="$(git tag --points-at HEAD | tr '\n' ',')"
          node scripts/resolve-next-release.js \
            --branch "${GITHUB_REF_NAME}" \
            --tags "${TAGS}" \
            --head-tags "${HEAD_TAGS}" \
            --github-output true

  publish-image:
    needs: compute-release
    strategy:
      matrix:
        include:
          - runner: [self-hosted, Linux, X64]
            platform: linux/amd64
            suffix: linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: linux-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/native/aurral-worker

      - name: Build aurral-worker
        working-directory: backend/native/aurral-worker
        run: cargo build --release

      - name: Stage Rust binary for Docker
        run: |
          mkdir -p .build
          cp backend/native/aurral-worker/target/release/aurral-worker .build/aurral-worker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.compute-release.outputs.version }}-${{ matrix.suffix }}

      - name: Prepare local BuildKit cache
        id: cache
        run: |
          CACHE_DIR="${HOME}/.cache/aurral-buildkit"
          mkdir -p "${CACHE_DIR}"
          echo "src=${CACHE_DIR}" >> "$GITHUB_OUTPUT"
          echo "dest=${CACHE_DIR}-new" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platform }}
          build-args: |
            APP_VERSION=${{ needs.compute-release.outputs.version }}
            GITHUB_REPO=${{ github.repository }}
            RELEASE_CHANNEL=${{ needs.compute-release.outputs.channel }}
          cache-from: type=local,src=${{ steps.cache.outputs.src }}
          cache-to: type=local,dest=${{ steps.cache.outputs.dest }},mode=max

      - name: Rotate BuildKit cache
        if: always()
        run: |
          rm -rf "${{ steps.cache.outputs.src }}"
          mv "${{ steps.cache.outputs.dest }}" "${{ steps.cache.outputs.src }}" || true

  merge-manifest:
    needs: [compute-release, publish-image]
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    permissions:
      packages: write
    steps:
      - name: Log into ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          VERSION: ${{ needs.compute-release.outputs.version }}
          CHANNEL: ${{ needs.compute-release.outputs.channel }}
          REPO: ghcr.io/${{ github.repository }}
        run: |
          docker buildx imagetools create -t "${REPO}:${VERSION}" \
            "${REPO}:${VERSION}-linux-amd64" \
            "${REPO}:${VERSION}-linux-arm64"

          if [ "${CHANNEL}" = "stable" ]; then
            docker buildx imagetools create -t "${REPO}:latest" \
              "${REPO}:${VERSION}-linux-amd64" \
              "${REPO}:${VERSION}-linux-arm64"
          elif [ "${CHANNEL}" = "test" ]; then
            docker buildx imagetools create -t "${REPO}:test" \
              "${REPO}:${VERSION}-linux-amd64" \
              "${REPO}:${VERSION}-linux-arm64"
          elif [ "${CHANNEL}" = "dev" ]; then
            docker buildx imagetools create -t "${REPO}:dev" \
              "${REPO}:${VERSION}-linux-amd64" \
              "${REPO}:${VERSION}-linux-arm64"
          fi

  create-tag:
    needs: [compute-release, merge-manifest]
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or confirm release tag
        env:
          RELEASE_TAG: ${{ needs.compute-release.outputs.tag }}
        run: |
          git fetch --force --tags
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists."
            exit 0
          fi
          git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

  publish-github-release:
    needs: [compute-release, create-tag]
    if: needs.compute-release.outputs.channel == 'stable'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.compute-release.outputs.tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
            exit 0
          fi
          gh release create "${RELEASE_TAG}" \
            --verify-tag \
            --generate-notes \
            --latest

  build-desktop:
    needs: [compute-release, guard-head, publish-github-release]
    if: needs.guard-head.outputs.is_current_head == 'true' && needs.compute-release.outputs.channel == 'stable'
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Sync desktop version
        run: npm run sync-version --prefix desktop

      - name: Ensure desktop icons
        working-directory: desktop
        run: |
          if [ ! -f src-tauri/icons/icon.icns ]; then
            npm run icons
          fi

      - name: Pin brotli-decompressor for reproducible builds
        working-directory: desktop/src-tauri
        run: cargo update -p brotli-decompressor --precise 5.0.1

      - name: Build macOS desktop app
        working-directory: desktop
        run: npm run build

      - name: Upload desktop release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.compute-release.outputs.tag }}
        run: |
          DMG_PATH="$(find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit)"
          if [ -z "${DMG_PATH}" ]; then
            echo "No .dmg artifact found."
            exit 1
          fi
          gh release upload "${RELEASE_TAG}" "${DMG_PATH}" --clobber
