name: Release

on:
  push:
    branches: ["main", "test"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - run: npm ci

      - run: npm ci
        working-directory: backend

      - run: npm ci
        working-directory: frontend

      - run: npm run lint
        working-directory: frontend

      - name: Run test suite
        run: npm test

      - name: Build app
        run: npm run build

      - name: Start app
        run: |
          npm start > /tmp/aurral.log 2>&1 &
          echo $! > /tmp/aurral.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/api/health > /tmp/aurral-health.json; then
              cat /tmp/aurral-health.json
              exit 0
            fi
            sleep 2
          done
          if [ -f /tmp/aurral.log ]; then
            cat /tmp/aurral.log
          else
            echo "App log not found at /tmp/aurral.log"
          fi
          exit 1

      - name: Print app log on failure
        if: failure()
        run: |
          if [ -f /tmp/aurral.log ]; then
            cat /tmp/aurral.log
          else
            echo "App log not found at /tmp/aurral.log"
          fi

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/aurral.pid ]; then
            kill "$(cat /tmp/aurral.pid)" || true
          fi

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
