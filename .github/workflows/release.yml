name: Release

on:
  push:
    branches: ["main", "test"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Clear test prerelease tags
        if: github.ref_name == 'test'
        run: |
          git fetch --force --tags
          for tag in $(git tag -l 'v*-test.*'); do
            git tag -d "$tag"
          done
          for tag in $(git ls-remote --tags --refs origin 'v*-test.*' | awk '{print $2}' | sed 's#refs/tags/##'); do
            git push origin ":refs/tags/$tag"
          done
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release