services:
  aurral:
    image: ghcr.io/lklynet/aurral:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - /data:/data
      - ./config:/config

  lidarr:
    image: lscr.io/linuxserver/lidarr:nightly
    restart: unless-stopped
    ports:
      - "8686:8686"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - /data:/data
      - ./config/lidarr:/config

  slskd:
    image: slskd/slskd:latest
    restart: unless-stopped
    ports:
      - "5030:5030"
    volumes:
      - /data:/data
      - ./config/slskd:/app

  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    ports:
      - "4533:4533"
    environment:
      - ND_SCANNER_PURGEMISSING=always
      - ND_DATA=/config
    volumes:
      - /data:/data:ro
      - ./data/navidrome:/config
