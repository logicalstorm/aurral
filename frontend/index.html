<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..900;1,9..40,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%arralogo.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Aurral</title>
    <meta name="description" content="Self-hosted music discovery for the Lidarr stack" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#030712" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Aurral" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/aurral-icon-iOS-Default-1024x1024@1x.png" />
    <script>
      (function () {
        if (!location.pathname.endsWith("/oauth.html")) return;
        var query = location.search;
        if (!query && location.hash) {
          query = "?" + String(location.hash).replace(/^#/, "");
        }
        var params = new URLSearchParams(String(query || "").replace(/^\?/, ""));
        var accessToken = params.get("access_token");
        var refreshToken = params.get("refresh_token");
        if (!accessToken || !refreshToken) return;
        try {
          localStorage.setItem(
            "aurral:spotify-oauth-pending",
            JSON.stringify({
              access_token: accessToken,
              refresh_token: refreshToken,
              expires_in: params.get("expires_in"),
              savedAt: Date.now(),
            }),
          );
        } catch (_) {}
        if (window.opener) {
          try {
            window.opener.postMessage(
              { type: "aurral-spotify-oauth-ready" },
              location.origin,
            );
          } catch (_) {}
          window.close();
          return;
        }
        var returnPath = "/playlists";
        try {
          returnPath =
            sessionStorage.getItem("aurral:spotify-oauth-return") || returnPath;
          sessionStorage.removeItem("aurral:spotify-oauth-return");
        } catch (_) {}
        location.replace(returnPath);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
