<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OAuth landing page</title>
    <script>
      (function () {
        function closePopup() {
          window.close();
        }
        function readOAuthQuery() {
          if (window.location.search) {
            return window.location.search;
          }
          const hash = String(window.location.hash || "").replace(/^#/, "");
          return hash ? `?${hash}` : "";
        }
        function readOAuthPayload() {
          const params = new URLSearchParams(readOAuthQuery().replace(/^\?/, ""));
          return {
            query: readOAuthQuery(),
            access_token: params.get("access_token"),
            refresh_token: params.get("refresh_token"),
            expires_in: params.get("expires_in"),
          };
        }
        const payload = readOAuthPayload();
        try {
          if (window.opener) {
            if (typeof window.opener.onCompleteOauth === "function") {
              window.opener.onCompleteOauth(payload.query, closePopup);
              return;
            }
            window.opener.postMessage(
              {
                type: "aurral-spotify-oauth",
                access_token: payload.access_token,
                refresh_token: payload.refresh_token,
                expires_in: payload.expires_in,
              },
              window.location.origin,
            );
            closePopup();
            return;
          }
        } catch (_) {}
        closePopup();
      })();
    </script>
  </head>
  <body></body>
</html>
